name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  stablemed:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: ci-anon-key
    defaults:
      run:
        working-directory: StableMed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: StableMed/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Strict verification
        run: npm run verify:strict

      - name: Build
        run: npm run build
