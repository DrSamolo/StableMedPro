<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StableMed CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #FAFAFA;
        color: #111111;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Custom Scrollbar for a cleaner look */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #e5e5e5;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #d4d4d4;
      }

      /* --- ANIMATIONS STUDIO (LINEAR / STRIPE STYLE) --- */
      
      /* La courbe magique : Fluide, rapide au début, atterrissage doux */
      :root {
        --ease-sweet: cubic-bezier(0.16, 1, 0.3, 1);
      }

      /* Staggered Entry Animation */
      @keyframes enter {
        0% {
          opacity: 0;
          transform: translateY(10px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-enter {
        animation: enter 0.6s var(--ease-sweet) both;
      }

      /* Micro-interactions */
      .micro-interaction {
        transition: all 0.2s var(--ease-sweet);
        will-change: transform, box-shadow, border-color;
      }
      
      .micro-interaction:hover {
        border-color: #d4d4d8; /* Zinc 300 */
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      }

      .micro-interaction:active {
        transform: scale(0.98);
      }

      /* Utilities for React inline styles */
      .delay-0 { animation-delay: 0ms; }
      
      /* Glassmorphism utility */
      .glass-panel {
        background-color: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#FAFAFA',
              surface: '#FFFFFF',
              border: '#EDEDED',
              primary: '#18181B', // Zinc 900
              secondary: '#71717A', // Zinc 500
              accent: '#E4E4E7', // Zinc 200
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            boxShadow: {
              'subtle': '0 1px 2px 0 rgba(0, 0, 0, 0.02)',
              'card': '0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02)',
              'float': '0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025)',
            },
            transitionTimingFunction: {
              'sweet': 'cubic-bezier(0.16, 1, 0.3, 1)',
            }
          }
        }
      }
    </script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
